<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1.0" />
  <title>lesson_art_v1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* lesson_art_v1 — fixed_mockup contract (template_id: lesson_art_v1) */
    :root {
      --canvas-w: 1080px;
      --canvas-min-h: 1400px;
      --outer-pad: 48px;
      --bg: #f6efe6;
      --bg-2: #efe4d7;
      --title-card-bg: #f8f1e9;
      --content-card-bg: #ffffff;
      --content-card-border: rgba(255, 255, 255, 0.85);
      --text: #2f231c;
      --title-color: #2c1f18;
      --muted: #8d796a;
      --shadow: 0 18px 40px rgba(74, 53, 39, 0.08);
      --shadow-soft: 0 10px 24px rgba(74, 53, 39, 0.06);
      --radius-title: 34px;
      --radius-card: 28px;
      --radius-image: 28px;
      --radius-pill: 999px;
      --title-size: 54px;
      --section-label-size: 12px;
      --body-size: 19px;
      --grid-gap: 24px;
      --hero-h: 360px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at 12% 8%, rgba(255, 255, 255, 0.65) 0%, transparent 36%),
        radial-gradient(circle at 88% 18%, rgba(255, 255, 255, 0.45) 0%, transparent 32%),
        radial-gradient(ellipse 120% 80% at 50% 100%, rgba(230, 215, 198, 0.35) 0%, transparent 45%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: "Plus Jakarta Sans", Arial, sans-serif;
    }

    .canvas {
      width: var(--canvas-w);
      min-height: var(--canvas-min-h);
      margin: 0 auto;
      padding: var(--outer-pad);
      overflow: hidden;
    }

    .title-card {
      background: linear-gradient(180deg, var(--title-card-bg) 0%, #f3ebe3 100%);
      border-radius: var(--radius-title);
      box-shadow: var(--shadow);
      padding: 28px 40px 32px;
      text-align: center;
      margin-bottom: var(--grid-gap);
      border: 1px solid var(--content-card-border);
      max-width: 100%;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      font-weight: 500;
    }

    .title {
      margin: 0 auto;
      max-width: 100%;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: var(--title-size);
      line-height: 1.05;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--title-color);
      overflow-wrap: anywhere;
      word-wrap: break-word;
    }

    .title-accent {
      width: min(280px, 72%);
      height: 12px;
      margin: 18px auto 0;
      border-radius: var(--radius-pill);
      background:
        radial-gradient(ellipse at center, rgba(191, 164, 142, 0.55) 0%, rgba(191, 164, 142, 0.18) 45%, rgba(191, 164, 142, 0) 75%);
    }

    .top-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--grid-gap);
      margin-bottom: var(--grid-gap);
    }

    .card {
      position: relative;
      background: var(--content-card-bg);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-soft);
      padding: 20px 22px 22px;
      border: 1px solid var(--content-card-border);
      min-height: 0;
      min-width: 0;
      overflow: auto;
      max-height: 420px;
    }

    .card::before {
      content: "";
      position: absolute;
      left: 16px;
      top: 16px;
      bottom: 16px;
      width: 3px;
      border-radius: var(--radius-pill);
      background: linear-gradient(180deg, rgba(202, 181, 164, 0.65), rgba(202, 181, 164, 0));
      opacity: 0.75;
      pointer-events: none;
    }

    .card-inner {
      margin-left: 8px;
      min-width: 0;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: var(--section-label-size);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    ul.clean-list {
      margin: 0;
      padding-left: 20px;
      list-style: disc;
    }

    ul.clean-list li {
      margin: 0 0 10px;
      font-size: var(--body-size);
      line-height: 1.45;
      color: var(--text);
    }

    ul.clean-list li:last-child {
      margin-bottom: 0;
    }

    .vocab-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-content: flex-start;
      max-height: 320px;
      overflow-y: auto;
    }

    .vocab-wrap .la-vocab-pill {
      display: inline-flex;
      align-items: center;
      margin: 0;
      padding: 10px 16px;
      border-radius: var(--radius-pill);
      list-style: none;
      background: linear-gradient(180deg, #f8f3ec 0%, #efe5d9 100%);
      border: 1px solid rgba(144, 117, 98, 0.14);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
      color: #4c3b30;
      font-size: calc(var(--body-size) - 1px);
      line-height: 1.2;
      max-width: 100%;
      white-space: normal;
    }

    .vocab-wrap .la-vocab-text {
      display: inline;
      overflow-wrap: anywhere;
    }

    /* bottom_composition: asymmetric_split 68% / 32% */
    .bottom-row {
      display: grid;
      grid-template-columns: minmax(0, 68fr) minmax(0, 32fr);
      gap: var(--grid-gap);
      align-items: stretch;
      min-height: 0;
    }

    .bottom-hero {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .media-frame {
      height: var(--hero-h);
      width: 100%;
      border-radius: var(--radius-image);
      overflow: hidden;
      background: linear-gradient(180deg, #eadfd2 0%, #d9c9b6 100%);
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(115, 93, 78, 0.1);
      flex-shrink: 0;
    }

    .media-frame figure.la-media-img {
      margin: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .media-frame figure.la-media-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .media-frame .la-media-placeholder {
      width: 100%;
      height: 100%;
      min-height: var(--hero-h);
      display: grid;
      place-items: center;
      font-size: 16px;
      color: rgba(76, 59, 48, 0.55);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.55), transparent 24%),
        linear-gradient(180deg, #efe5d8 0%, #dbcbb9 100%);
    }

    .bottom-echo {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .bottom-echo .card {
      flex: 1 1 auto;
      min-height: var(--hero-h);
      max-height: none;
      display: flex;
      flex-direction: column;
    }

    .bottom-echo .vocab-wrap {
      max-height: none;
      flex: 1 1 auto;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <main class="canvas">
    <section class="title-card">
      <div class="eyebrow">Lesson</div>
      <h1 class="title">$title</h1>
      <div class="title-accent" aria-hidden="true"></div>
    </section>

    <section class="top-grid" aria-label="Content grid">
      <article class="card">
        <div class="card-inner">
          <h2 class="section-title">LEAD-IN</h2>
          <ul class="clean-list">
            $lead_in_items
          </ul>
        </div>
      </article>

      <article class="card">
        <div class="card-inner">
          <h2 class="section-title">DISCUSSION</h2>
          <ul class="clean-list">
            $discussion_items
          </ul>
        </div>
      </article>

      <article class="card">
        <div class="card-inner">
          <h2 class="section-title">THIS OR THAT</h2>
          <ul class="clean-list">
            $choice_items
          </ul>
        </div>
      </article>

      <article class="card">
        <div class="card-inner">
          <h2 class="section-title">VOCAB</h2>
          <div class="vocab-wrap">
            $vocab_items
          </div>
        </div>
      </article>
    </section>

    <section class="bottom-row" aria-label="Bottom composition">
      <div class="bottom-hero">
        <div class="media-frame">
          $media_block
        </div>
      </div>
      <div class="bottom-echo">
        <article class="card">
          <div class="card-inner">
            <h2 class="section-title">VOCAB</h2>
            <div class="vocab-wrap">
              $vocab_items
            </div>
          </div>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
