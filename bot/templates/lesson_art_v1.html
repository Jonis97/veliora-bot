<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lesson Art V1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6efe6;
      --bg-2: #efe4d7;
      --card: rgba(255,255,255,0.96);
      --text: #2f231c;
      --muted: #8d796a;
      --line: rgba(115, 93, 78, 0.14);
      --shadow: 0 18px 40px rgba(74, 53, 39, 0.08);
      --shadow-soft: 0 10px 24px rgba(74, 53, 39, 0.06);
      --radius-xl: 34px;
      --radius-lg: 28px;
      --radius-md: 22px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.7), transparent 30%),
        radial-gradient(circle at top right, rgba(255,255,255,0.55), transparent 28%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      color: var(--text);
    }

    body {
      font-family: "Plus Jakarta Sans", Arial, sans-serif;
      padding: 36px;
    }

    .sheet {
      width: 920px;
      margin: 0 auto;
      padding: 22px;
      border-radius: 38px;
      background: rgba(255,255,255,0.14);
    }

    .title-card {
      background: linear-gradient(180deg, #fbf7f1 0%, #f3ebe0 100%);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 26px 44px 28px;
      text-align: center;
      margin-bottom: 22px;
      border: 1px solid rgba(255,255,255,0.7);
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      font-weight: 500;
    }

    .title {
      margin: 0;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 56px;
      line-height: 0.98;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: #2c1f18;
    }

    .title-accent {
      width: 250px;
      height: 12px;
      margin: 16px auto 0;
      border-radius: 999px;
      background:
        radial-gradient(ellipse at center, rgba(191,164,142,0.55) 0%, rgba(191,164,142,0.18) 45%, rgba(191,164,142,0) 75%);
      filter: blur(0.2px);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .card {
      position: relative;
      background: var(--card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      padding: 22px 24px 24px;
      overflow: hidden;
      min-height: 198px;
      border: 1px solid rgba(255,255,255,0.85);
    }

    .card::before {
      content: "";
      position: absolute;
      left: 18px;
      top: 18px;
      bottom: 18px;
      width: 3px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(202,181,164,0.65), rgba(202,181,164,0));
      opacity: 0.7;
    }

    .card-inner {
      margin-left: 6px;
    }

    .section-title {
      margin: 0 0 18px;
      font-size: 12px;
      letter-spacing: 0.30em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    ul.clean-list {
      margin: 0;
      padding-left: 22px;
      list-style: disc;
    }

    ul.clean-list li {
      margin: 0 0 12px;
      font-size: 19px;
      line-height: 1.42;
      color: var(--text);
    }

    ul.clean-list li:last-child {
      margin-bottom: 0;
    }

    .vocab-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding-top: 2px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 12px 18px;
      border-radius: 999px;
      background: linear-gradient(180deg, #f8f3ec 0%, #efe5d9 100%);
      border: 1px solid rgba(144, 117, 98, 0.14);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.75);
      color: #4c3b30;
      font-size: 18px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .media {
      margin-top: 6px;
      background: rgba(255,255,255,0.28);
      border-radius: var(--radius-xl);
      padding: 14px;
      box-shadow: var(--shadow-soft);
    }

    .media-frame {
      height: 360px;
      width: 100%;
      border-radius: 28px;
      overflow: hidden;
      background: linear-gradient(180deg, #eadfd2 0%, #d9c9b6 100%);
    }

    .media-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .media-placeholder {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      font-size: 18px;
      color: rgba(76,59,48,0.6);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.55), transparent 24%),
        linear-gradient(180deg, #efe5d8 0%, #dbcbb9 100%);
    }
  </style>
</head>
<body>
  <main class="sheet">
    <section class="title-card">
      <div class="eyebrow">Lesson</div>
      <h1 class="title">$title</h1>
      <div class="title-accent"></div>
    </section>

    <section class="grid">
      <article class="card">
        <div class="card-inner">
          <h2 class="section-title">Lead-in</h2>
          <ul class="clean-list">
            $lead_in_items
          </ul>
        </div>
      </article>

      <article class="card">
        <div class="card-inner">
          <h2 class="section-title">Discussion</h2>
          <ul class="clean-list">
            $discussion_items
          </ul>
        </div>
      </article>

      <article class="card">
        <div class="card-inner">
          <h2 class="section-title">This or That</h2>
          <ul class="clean-list">
            $choice_items
          </ul>
        </div>
      </article>

      <article class="card">
        <div class="card-inner">
          <h2 class="section-title">Vocabulary</h2>
          <div class="vocab-wrap">
            $vocab_items
          </div>
        </div>
      </article>
    </section>

    <section class="media">
      <div class="media-frame">
        $media_block
      </div>
    </section>
  </main>
</body>
</html>
