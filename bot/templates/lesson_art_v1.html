<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=600, initial-scale=1.0" />
  <title>Veliora Lesson Art v2.1</title>
  <style>
    :root {
      --bg: #efe7db;
      --paper: #fbf7ef;
      --paper-2: #f4ead7;
      --paper-3: #f8f2e7;
      --ink: #33261c;
      --muted: #7a6756;
      --accent: #8e1f24;
      --line: rgba(110, 86, 64, 0.14);
      --shadow-soft: 0 12px 30px rgba(70, 45, 24, 0.12);
      --shadow-card: 0 14px 28px rgba(59, 39, 23, 0.14), 0 3px 8px rgba(59, 39, 23, 0.06);
      --shadow-photo: 0 16px 30px rgba(45, 30, 18, 0.18), 0 4px 10px rgba(45, 30, 18, 0.08);
      --radius-xl: 26px;
      --radius-lg: 22px;
      --radius-md: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 600px;
      background: #ddd6ca;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .page {
  position: relative;
  width: 600px;
  height: 920px;
  overflow: hidden;
  background:
    radial-gradient(circle at 20% 18%, rgba(255,255,255,0.10), transparent 28%),
    radial-gradient(circle at 78% 74%, rgba(255,255,255,0.08), transparent 24%),
    linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)),
    #d8cec2;
  box-shadow: 0 18px 40px rgba(0,0,0,0.14);
}

    /* stronger paper texture */
    .page::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0.42;
  background-image:
    radial-gradient(rgba(72,58,45,0.18) 0.7px, transparent 0.9px),
    radial-gradient(rgba(255,255,255,0.06) 0.8px, transparent 1px),
    linear-gradient(135deg, rgba(92,74,58,0.08), transparent 30%, transparent 70%, rgba(92,74,58,0.06)),
    linear-gradient(25deg, rgba(255,255,255,0.04), transparent 32%);
  background-size: 10px 10px, 14px 14px, 100% 100%, 100% 100%;
  background-position: 0 0, 4px 7px, 0 0, 0 0;
  mix-blend-mode: multiply;
  z-index: 0;
}

    /* extra cream-paper overlay */
    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.16;
      background:
        linear-gradient(180deg, rgba(255,250,243,0.35), rgba(255,250,243,0.08)),
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.24), transparent 32%),
        radial-gradient(circle at 78% 70%, rgba(255,255,255,0.18), transparent 28%);
      mix-blend-mode: soft-light;
      z-index: 0;
    }

    .spine {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 48px;
      width: 1px;
      background: linear-gradient(
        180deg,
        rgba(168,125,97,0.12),
        rgba(168,125,97,0.26),
        rgba(168,125,97,0.12)
      );
      z-index: 1;
    }

    .topbar {
      position: absolute;
      top: 20px;
      left: 18px;
      right: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 5;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      font-family: Arial, Helvetica, sans-serif;
      color: #725843;
      font-size: 15px;
      font-weight: 600;
    }

    .brand-badge {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: radial-gradient(circle at 35% 30%, #b24a3f, #7f1d20 62%, #651417 100%);
      color: #f7e8dc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.35), 0 3px 8px rgba(70,20,20,0.22);
    }

    .lesson-pill {
      padding: 7px 14px 8px;
      border-radius: 999px;
      background: #8e1f24;
      color: #fff8f4;
      font: 700 12px/1 Arial, Helvetica, sans-serif;
      letter-spacing: 0.2px;
      box-shadow: 0 4px 10px rgba(93,18,22,0.18);
    }

    .hero {
  position: absolute;
  left: 60px;
  top: 78px;
  width: 480px;
  z-index: 4;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.title {
  margin: 0;
  text-align: center;
  font-size: 29px;
  line-height: 1.18;
  font-style: italic;
  font-weight: 700;
  color: #3a281a;
  letter-spacing: -0.3px;
  text-wrap: balance;
  max-width: 430px;
}

.title-rule {
  width: 220px;
  height: 1px;
  margin-top: 14px;
  background: linear-gradient(90deg, rgba(112,86,64,0.05), rgba(112,86,64,0.20), rgba(112,86,64,0.05));
}

    .botanical {
      position: absolute;
      inset: auto auto 76px -40px;
      width: 360px;
      height: 430px;
      z-index: 0;
      opacity: 0.24;
      pointer-events: none;
      filter: blur(0.1px);
    }

    .botanical svg {
      width: 100%;
      height: 100%;
    }

    .note {
  position: absolute;
  padding: 16px 18px 16px;
  border-radius: var(--radius-lg);
  overflow: visible;
  z-index: 3;
  backdrop-filter: blur(0.4px);
  border: 1px solid rgba(255,255,255,0.18);
}

.note.light {
  background: linear-gradient(180deg, rgba(255,252,247,0.96), rgba(248,242,233,0.96));
  box-shadow:
    -8px 10px 20px rgba(68,48,31,0.10),
    0 3px 10px rgba(68,48,31,0.05);
}

.note.warm {
  background: linear-gradient(180deg, rgba(243,232,208,0.97), rgba(234,220,191,0.97));
  box-shadow:
    10px 12px 24px rgba(72,50,32,0.12),
    0 4px 10px rgba(72,50,32,0.05);
}

.note.soft {
  background: linear-gradient(180deg, rgba(252,247,238,0.96), rgba(244,235,220,0.96));
  box-shadow:
    8px 12px 22px rgba(65,46,30,0.11),
    0 3px 10px rgba(65,46,30,0.05);
}

    .note-title {
      margin: 0 0 12px 0;
      font-size: 14px;
      line-height: 1.1;
      color: #6b5644;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .note-line {
      width: 100%;
      height: 1px;
      margin-bottom: 12px;
      background: linear-gradient(90deg, rgba(117,93,73,0.28), rgba(117,93,73,0.06));
    }

    .note ul {
      margin: 0;
      padding-left: 20px;
      font-size: 14px;
      line-height: 1.42;
      color: #2f241c;
    }

    .note li {
      margin: 0 0 6px 0;
    }

    .lead {
      top: 195px;
      left: 25px;
      width: 270px;
      min-height: 180px;
      transform: rotate(-1.4deg);
    }

    .discussion {
      top: 206px;
      right: 24px;
      width: 270px;
      min-height: 192px;
      transform: rotate(1.35deg);
      z-index: 4;
    }

    .choice {
      top: 413px;
      left: 23px;
      width: 278px;
      min-height: 185px;
      transform: rotate(-0.95deg);
      z-index: 3;
    }

    .vocab {
      top: 430px;
      right: 28px;
      width: 246px;
      min-height: 175px;
      transform: rotate(1.2deg);
      z-index: 6;
    }

    .pin {
      position: absolute;
      width: 15px;
      height: 15px;
      border-radius: 999px;
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.45),
        0 2px 5px rgba(55,38,24,0.20);
    }

    .pin.red {
      background: radial-gradient(circle at 35% 30%, #d35649, #a82324 68%, #7f181a 100%);
    }

    .pin.yellow {
      background: radial-gradient(circle at 35% 30%, #f4d468, #d2a92a 68%, #b98d15 100%);
    }

    .pin.silver {
      background: radial-gradient(circle at 35% 30%, #f0f0f0, #b6bac0 68%, #8d939b 100%);
    }

    .lead .pin {
      top: -9px;
      left: 14px;
    }

    .discussion .pin {
      top: -9px;
      right: 16px;
    }

    .choice .pin {
      top: -9px;
      left: 126px;
    }

    .vocab .pin {
      top: -9px;
      right: 18px;
    }

    .note::before {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      top: -8px;
      height: 12px;
      opacity: 0.88;
      background:
        linear-gradient(-45deg, transparent 7px, rgba(255,255,255,0.88) 0) left,
        linear-gradient(45deg, transparent 7px, rgba(255,255,255,0.88) 0) right;
      background-size: 12px 12px;
      background-repeat: repeat-x;
      filter: drop-shadow(0 1px 0 rgba(135,110,85,0.08));
    }

    .media-wrap {
  position: absolute;
  left: 38px;
  bottom: 0;
  width: 524px;
  height: 290px;
  border-radius: 18px 18px 0 0;
  overflow: hidden;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.08),
    0 -10px 18px rgba(58,40,25,0.06);
  transform: none;
  z-index: 1;
  background: #cfc4b6;
}

    .media-wrap::before {
      content: "";
      position: absolute;
      top: -14px;
      left: 22px;
      width: 72px;
      height: 24px;
      border-radius: 4px;
      background: rgba(244, 232, 204, 0.72);
      box-shadow: 0 2px 6px rgba(60,42,26,0.08);
      transform: rotate(-4deg);
      z-index: 8;
    }

    .media-wrap {
  position: absolute;
  left: 0;
  bottom: 0;
  width: 600px;
  height: 280px;
  border-radius: 0;
  overflow: hidden;
  box-shadow: none;
  transform: none;
  z-index: 1;
  background: #ddd3c5;
}

.media-frame {
  position: absolute;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  background:
    linear-gradient(180deg, rgba(216,206,194,0.82) 0%, rgba(216,206,194,0.42) 18%, rgba(216,206,194,0.10) 42%, rgba(216,206,194,0.0) 68%),
    linear-gradient(90deg, rgba(216,206,194,0.24) 0%, rgba(216,206,194,0.00) 16%, rgba(216,206,194,0.00) 84%, rgba(216,206,194,0.24) 100%),
    radial-gradient(circle at 50% 16%, rgba(255,255,255,0.14), transparent 28%);
}

    .media-block {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .media-block img,
.media-block video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  filter: brightness(0.98) contrast(0.94) saturate(0.88);
}

    .paper-fragment {
      position: absolute;
      background: rgba(255, 248, 237, 0.58);
      box-shadow: 0 10px 20px rgba(60,42,26,0.06);
      filter: blur(0.15px);
      z-index: 1;
    }

    .frag-1 {
      width: 112px;
      height: 44px;
      top: 165px;
      right: 92px;
      transform: rotate(-7deg);
      border-radius: 8px 18px 10px 14px;
    }

    .frag-2 {
      width: 84px;
      height: 38px;
      top: 586px;
      right: 42px;
      transform: rotate(11deg);
      border-radius: 12px 8px 16px 8px;
    }

    .frag-3 {
      width: 92px;
      height: 34px;
      bottom: 70px;
      left: 94px;
      transform: rotate(-6deg);
      border-radius: 10px 15px 8px 12px;
      opacity: 0.42;
    }

    .footer-glow {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 120px;
      height: 220px;
      background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.34), transparent 62%);
      pointer-events: none;
      z-index: 0;
    }

    .note ul,
    .title {
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="spine"></div>

    <div class="topbar">
      <div class="brand">
        <div class="brand-badge">V</div>
        <div>Veliora</div>
      </div>
      <div class="lesson-pill">Lesson</div>
    </div>

    <div class="hero">
      <h1 class="title">$title</h1>
      <div class="title-rule"></div>
    </div>

    <div class="paper-fragment frag-1"></div>
    <div class="paper-fragment frag-2"></div>
    <div class="paper-fragment frag-3"></div>

    <div class="botanical" aria-hidden="true">
      <svg viewBox="0 0 300 420" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M142 404C145 345 151 299 160 255C169 211 184 171 210 129" stroke="#a98066" stroke-width="4" stroke-linecap="round"/>
        <path d="M158 273C130 255 104 252 72 258" stroke="#b79277" stroke-width="3.2" stroke-linecap="round"/>
        <path d="M165 244C197 235 224 218 244 193" stroke="#b79277" stroke-width="3.2" stroke-linecap="round"/>
        <path d="M179 205C154 182 132 171 101 166" stroke="#b79277" stroke-width="2.8" stroke-linecap="round"/>
        <path d="M188 178C215 170 236 154 251 131" stroke="#b79277" stroke-width="2.8" stroke-linecap="round"/>

        <ellipse cx="84" cy="259" rx="34" ry="20" transform="rotate(-9 84 259)" fill="#d7b9a3"/>
        <ellipse cx="235" cy="192" rx="35" ry="18" transform="rotate(-14 235 192)" fill="#d7b9a3"/>
        <ellipse cx="107" cy="167" rx="29" ry="16" transform="rotate(18 107 167)" fill="#d7b9a3"/>
        <ellipse cx="250" cy="130" rx="28" ry="15" transform="rotate(-20 250 130)" fill="#d7b9a3"/>
      </svg>
    </div>

    <section class="note light lead">
      <div class="pin silver"></div>
      <div class="note-title">Lead-in</div>
      <div class="note-line"></div>
      <ul>$lead_in_items</ul>
    </section>

    <section class="note warm discussion">
      <div class="pin yellow"></div>
      <div class="note-title">Discussion</div>
      <div class="note-line"></div>
      <ul>$discussion_items</ul>
    </section>

    <section class="note light choice">
      <div class="pin yellow"></div>
      <div class="note-title">This or that</div>
      <div class="note-line"></div>
      <ul>$choice_items</ul>
    </section>

    <section class="note soft vocab">
      <div class="pin silver"></div>
      <div class="note-title">Vocab</div>
      <div class="note-line"></div>
      <ul>$vocab_items</ul>
    </section>

    <div class="media-wrap">
      <div class="media-block">$media_block</div>
      <div class="media-frame"></div>
    </div>

    <div class="footer-glow"></div>
  </div>
</body>
</html>
