<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=600, initial-scale=1.0" />
  <title>Veliora Lesson</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 600px; background: #ddd6ca; }
    .page { position: relative; width: 600px; height: 920px; overflow: hidden; background: radial-gradient(circle at 14% 18%,rgba(255,255,255,0.46) 0 10%,transparent 11%),radial-gradient(circle at 88% 10%,rgba(255,255,255,0.28) 0 7%,transparent 8%),linear-gradient(180deg,rgba(255,255,255,0.22),rgba(255,255,255,0.04)),#f8f8f6; }
    .page::before{content:"";position:absolute;inset:0;opacity:0.06;pointer-events:none;background-image:radial-gradient(rgba(90,70,50,0.08) 0.5px,transparent 0.7px);background-size:18px 18px;mix-blend-mode:multiply;z-index:1;}
    
  </style>
</head>
<body>
  <div class="page">
  <div style="position:absolute;left:0px;top:0px;width:600px;height:58px;transform:rotate(0deg);opacity:1;z-index:10;background:linear-gradient(180deg,#1a1a2e,#1a1a2e);"><div style="position:relative;display:flex;align-items:center;padding:15px 18px 0;height:100%;gap:9px;color:#aaaacc;font-size:13px;font-weight:600;font-family:Arial,sans-serif;"><div style="width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ffffffcc,#ffffff 62%,#ffffff99 100%);color:#f7e8dc;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;">G</div><span>Grammar</span></div></div>
  <div class="lesson-pill" style="position:absolute;left:460px;top:11px;width:128px;height:34px;transform:rotate(0deg);opacity:1;z-index:10;border-radius:999px;box-shadow:0px 4px 10px rgba(59,39,23,0.18);background:linear-gradient(180deg,#3a3a6e,#3a3a6e);display:flex;align-items:center;justify-content:center;"><span style="font-family:'DM Sans', Arial, sans-serif;font-size:12px;font-weight:700;color:#e8e8ff;white-space:nowrap;">$level</span></div>
  <div class="hero" style="position:absolute;left:24px;top:72px;width:520px;height:80px;transform:rotate(0deg);opacity:1;z-index:10;"><h1 style="margin:0;font-family:'DM Sans', Arial, sans-serif;font-size:24px;line-height:1.18;font-style:normal;font-weight:700;color:#1a1a2e;text-align:left;word-wrap:break-word;">$title</h1></div>
  <div style="position:absolute;left:24px;top:160px;width:552px;height:2px;transform:rotate(0deg);opacity:1;z-index:10;background:linear-gradient(90deg,rgba(26,26,46,0.15),rgba(26,26,46,0.04)+"></div>
  <div class="paragraph" style="position:absolute;left:24px;top:172px;width:552px;height:32px;transform:rotate(0deg);opacity:1;z-index:10;padding:10px;overflow:hidden;"><p style="margin:0;font-family:'DM Sans', Arial, sans-serif;font-size:11px;color:#888899;line-height:1.4;text-align:left;word-wrap:break-word;">Instructions</p></div>
  <section class="note lead" style="position:absolute;left:24px;top:212px;width:552px;height:160px;transform:rotate(0deg);opacity:1;z-index:10;border-radius:12px;box-shadow:0px 4px 12px rgba(59,39,23,0.06);background:linear-gradient(180deg,#f0eef8,#e8e5f5);padding:15px 17px;overflow:hidden;">

    <div style="font-size:12px;color:#6b5644;font-weight:700;letter-spacing:0.5px;padding-top:0px;text-transform:uppercase;margin-bottom:6px;">Warm Up</div>
    <div style="width:100%;height:1px;background:linear-gradient(90deg,rgba(117,93,73,0.28),rgba(117,93,73,0.06));margin-bottom:7px;"></div>
    <ul style="margin:0;padding-left:18px;font-size:13px;line-height:1.45;color:#2f241c;">$lead_in_items</ul>
  </section>
  <section class="note discussion" style="position:absolute;left:24px;top:388px;width:552px;height:180px;transform:rotate(0deg);opacity:1;z-index:10;border-radius:12px;box-shadow:0px 4px 12px rgba(59,39,23,0.06);background:linear-gradient(180deg,#ffffff,#f5f5f5);padding:15px 17px;overflow:hidden;">

    <div style="font-size:12px;color:#6b5644;font-weight:700;letter-spacing:0.5px;padding-top:0px;text-transform:uppercase;margin-bottom:6px;">Grammar Focus</div>
    <div style="width:100%;height:1px;background:linear-gradient(90deg,rgba(117,93,73,0.28),rgba(117,93,73,0.06));margin-bottom:7px;"></div>
    <ul style="margin:0;padding-left:18px;font-size:13px;line-height:1.45;color:#2f241c;">$discussion_items</ul>
  </section>
  <section class="note vocab" style="position:absolute;left:24px;top:584px;width:552px;height:160px;transform:rotate(0deg);opacity:1;z-index:10;border-radius:12px;box-shadow:0px 4px 12px rgba(59,39,23,0.06);background:linear-gradient(180deg,#f0eef8,#e8e5f5);padding:15px 17px;overflow:hidden;">

    <div style="font-size:12px;color:#6b5644;font-weight:700;letter-spacing:0.5px;padding-top:0px;text-transform:uppercase;margin-bottom:6px;">Practice</div>
    <div style="width:100%;height:1px;background:linear-gradient(90deg,rgba(117,93,73,0.28),rgba(117,93,73,0.06));margin-bottom:7px;"></div>
    <ul style="margin:0;padding-left:18px;font-size:13px;line-height:1.45;color:#2f241c;">$vocab_items</ul>
  </section>
  <div style="position:absolute;left:24px;top:756px;width:552px;height:2px;transform:rotate(0deg);opacity:1;z-index:10;background:linear-gradient(90deg,rgba(26,26,46,0.10),rgba(26,26,46,0.03)+"></div>
  <div class="paragraph" style="position:absolute;left:24px;top:766px;width:552px;height:100px;transform:rotate(0deg);opacity:1;z-index:10;padding:10px;overflow:hidden;"><p style="margin:0;font-family:'DM Sans', Arial, sans-serif;font-size:12px;color:#555566;line-height:1.65;text-align:left;word-wrap:break-word;">Homework notes</p></div>
  </div>
</body>
</html>
